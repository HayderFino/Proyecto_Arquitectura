name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: smart-energy-hub/frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd smart-energy-hub/frontend
          npm ci

      - name: Build Project
        run: |
          cd smart-energy-hub/frontend
          npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: smart-energy-hub/frontend/dist
          branch: gh-pages
