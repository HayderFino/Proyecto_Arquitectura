version: '3.9'

services:
  # ─── Message Broker ─────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: seh-rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI → http://localhost:15672
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - seh-network

  # ─── MongoDB ────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: seh-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: smart_energy_hub
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: ["CMD","mongosh","--eval","db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - seh-network

  # ─── Microservicio: Ingesta ──────────────────────────────────
  ingesta:
    build:
      context: ./services/ingesta
      dockerfile: Dockerfile
    container_name: seh-ingesta
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq:5672
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/smart_energy_hub?authSource=admin
      NODE_ENV: development
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - seh-network

  # ─── Microservicio: Analítica ────────────────────────────────
  analitica:
    build:
      context: ./services/analitica
      dockerfile: Dockerfile
    container_name: seh-analitica
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq:5672
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/smart_energy_hub?authSource=admin
      SPIKE_THRESHOLD: 2.5
      NODE_ENV: development
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - seh-network

  # ─── Microservicio: Alertas ──────────────────────────────────
  alertas:
    build:
      context: ./services/alertas
      dockerfile: Dockerfile
    container_name: seh-alertas
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq:5672
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/smart_energy_hub?authSource=admin
      NODE_ENV: development
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - seh-network

  # ─── API Gateway ────────────────────────────────────────────
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: seh-gateway
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      INGESTA_URL: http://ingesta:3001
      ANALITICA_URL: http://analitica:3002
      ALERTAS_URL: http://alertas:3003
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/smart_energy_hub?authSource=admin
      JWT_SECRET: super_secret_jwt_key_change_in_prod
      NODE_ENV: development
    depends_on:
      - ingesta
      - analitica
      - alertas
    restart: unless-stopped
    networks:
      - seh-network

  # ─── Simulador de Sensores ───────────────────────────────────
  simulator:
    build:
      context: ./simulator
      dockerfile: Dockerfile
    container_name: seh-simulator
    environment:
      INGESTA_URL: http://ingesta:3001
      SEND_INTERVAL_MS: 3000
      DEVICE_COUNT: 6
      SPIKE_PROBABILITY: 0.1
    depends_on:
      - ingesta
    restart: unless-stopped
    networks:
      - seh-network

  # ─── Frontend ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: seh-frontend
    ports:
      - "5173:80"
    depends_on:
      - api-gateway
    restart: unless-stopped
    networks:
      - seh-network

volumes:
  rabbitmq_data:
  mongodb_data:

networks:
  seh-network:
    driver: bridge
